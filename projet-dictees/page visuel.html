<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tendances - Gestion des Dictées</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="nav-menu">
        <a href="page d'accueil.html">Accueil</a> | 
        <a href="page de saisie.html">Saisie</a> | 
        <a href="page de modification.html">Modifier</a> | 
        <a href="page visuel.html">Tendances</a>
    </div>

    <div class="header">
        <h1>Tendances de la Classe</h1>
    </div>

    <div class="main-container">
        <div class="chart-container">
            <canvas id="trendChart"></canvas>
        </div>

        <div class="stats-summary">
            <div class="stat-card">
                <h3>Moyenne Générale</h3>
                <div class="value">À remplir</div>
            </div>
            <div class="stat-card">
                <h3>Dictées Réalisées</h3>
                <div class="value">À remplir</div>
            </div>
            <div class="stat-card">
                <h3>Progression (Dernier mois)</h3>
                <div class="value">À remplir</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            // graphique en ligne
            new Chart(ctx, {
                type: 'line',
                data: {
                    // // Axi X : emplacements réservés pour les étiquettes
                    labels: ['À remplir', 'À remplir', 'À remplir', 'À remplir', 'À remplir'],
                    datasets: [{
                        label: 'Moyenne de la classe (/20)',
                        // Axe Y : utilisation de null pour garder le graphique vide, en attendant l'injection des données via PHP
                        data: [null, null, null, null, null],
                        borderColor: '#cccccc',
                        backgroundColor: 'rgba(200, 200, 200, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#cccccc',
                        pointRadius: 4,
                        spanGaps: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: 0,
                            max: 20, 
                            title: {
                                display: true,
                                text: 'Note Moyenne'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        title: {
                            display: true,
                            text: 'Évolution des résultats',
                            font: {
                                size: 16
                            }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
