<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail de Modification - Gestion des Dictées</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="nav-menu">
        <a href="index.html">Accueil</a> | 
        <a href="saisie.html">Saisie</a> | 
        <a href="modification.php">Modifier</a> | 
        <a href="visualisation.html">Tendances</a>
    </div>
    
    <div class="header">
        <h1>Modifier la Dictée</h1>
    </div>

    <div class="main-container clearfix">
        <form action="#" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" name="type">
                        <option value="dictee">Dictée</option>
                        <option value="test">Test</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="niveau">Niveau</label>
                    <select id="niveau" name="niveau">
                        <option value="a1">A1</option>
                        <option value="a2">A2</option>
                        <option value="b1">B1</option>
                        <option value="b2">B2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="titre">Titre</label>
                    <input type="text" id="titre" name="titre" value="Zèbre et la nature">
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" value="2023-10-12">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="auteur">Auteur</label>
                    <select id="auteur" name="auteur">
                        <option value="prof" selected>Professeur</option>
                        <option value="eleve">Élève</option>
                    </select>
                </div>
            </div>

            <div class="textarea-group">
                <textarea id="contenu" name="contenu">Le zèbre est un animal majestueux qui vit dans la savane...</textarea>
            </div>

            <button type="submit" class="submit-btn">Mettre à jour</button>
        </form>
    </div>
</body>
</html>
